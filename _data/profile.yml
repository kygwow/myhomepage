bio_short: Researcher working on optical imaging systems, computational optics, and
  biomedical photonics.
summary_academic: Research Professor at Seoul National University's Imaging Intelligence
  Laboratory, working on computational imaging, inverse optical design, lensless imaging,
  quantitative phase imaging, and biomedical photonics. My research connects optical
  system modeling, wave-optics simulation, and data-driven reconstruction for imaging
  problems where hardware design and computational inference must be considered together.
summary_industry: Optical systems and computational imaging researcher focused on
  physics-informed simulation, inverse optical design, lensless imaging, and machine-learning
  assisted image reconstruction. I translate research problems into imaging system
  models, reconstruction pipelines, and experimental strategies for optical and biomedical
  applications.
