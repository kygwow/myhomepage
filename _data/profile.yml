bio_short: Researcher working on optical imaging systems, computational optics, and
  biomedical photonics.
summary_academic: Research Professor at Seoul National University's Imaging Intelligence
  Laboratory, working on computational imaging, interferometric imaging, biomedical
  imaging, lensless imaging, quantitative phase microscopy, optical coherence microscopy,
  nonlinear microscopy, and biomedical image analysis. My work connects optical system
  design, wave-optics simulation, prototyping, and quantitative analysis for interdisciplinary
  imaging problems.
summary_industry: Optical systems and computational imaging researcher at Seoul National
  University's Imaging Intelligence Laboratory, experienced in imaging apparatus design,
  physics-based simulation, rapid prototyping, and advanced image processing. Current
  focus includes wave-optics simulation, inverse design of optical elements such as
  phase masks and diffractive optics, lensless camera reconstruction, and machine-learning
  assisted solutions for ill-posed imaging problems.
visibility: public
